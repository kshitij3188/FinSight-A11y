<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq — AI Accessibility Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic" />
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Lighthouse overlay -->
<div id="lh-overlay" aria-hidden="true"></div>

<!-- Animated guide mascot -->
<div id="mascot" aria-hidden="true">✦</div>

<!-- Narration toast -->
<div id="narration-toast" role="status" aria-live="polite"></div>

<div class="phone-frame">

  <!-- Top Navigation — direct child of frame, no sticky needed -->
  <nav class="top-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-logo" aria-label="bunq">bunq</div>
    <div class="nav-pills" role="tablist">
      <button class="nav-pill active" data-page="home" data-element-id="nav-home" role="tab" aria-selected="true" tabindex="0">Home</button>
      <button class="nav-pill" data-page="pay" data-element-id="nav-pay" role="tab" aria-selected="false" tabindex="0">Pay</button>
      <button class="nav-pill" data-page="accounts" data-element-id="nav-accounts" role="tab" aria-selected="false" tabindex="0">Accounts</button>
      <button class="nav-pill" data-page="cards" data-element-id="nav-cards" role="tab" aria-selected="false" tabindex="0">Cards</button>
      <button class="nav-pill" data-page="savings" data-element-id="nav-savings" role="tab" aria-selected="false" tabindex="0">Savings</button>
    </div>
    <div class="nav-avatar" aria-label="Profile">A</div>
  </nav>

  <!-- Accessibility controls bar -->
  <div class="a11y-bar">
    <div class="mode-selector" role="group" aria-label="Accessibility mode">
      <button class="mode-btn active" data-mode="default" aria-pressed="true">Aa</button>
      <button class="mode-btn" data-mode="blind" aria-pressed="false">👁</button>
      <button class="mode-btn" data-mode="low_vision" aria-pressed="false">🔍</button>
      <button class="mode-btn" data-mode="dyslexic" aria-pressed="false">Dy</button>
    </div>
    <div class="lang-selector" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
      <button class="lang-btn" data-lang="nl" aria-pressed="false">NL</button>
    </div>
  </div>

  <div class="phone-screen">
    <!-- Page Content (rendered by JS) -->
    <main id="page-content" role="main" aria-live="polite"></main>
  </div><!-- /.phone-screen -->

  <!-- AI Guide Widget -->
  <div id="ai-widget" aria-label="AI Guide assistant">
    <div class="widget-fab" id="widget-toggle" role="button" aria-expanded="false" aria-label="Open AI Guide" tabindex="0">✦</div>
    <div class="widget-panel" id="widget-panel" role="dialog" aria-label="AI Guide chat">
      <div class="widget-header">
        <div class="widget-header-dot"></div>
        <div>
          <div class="widget-header-title">Guide</div>
          <div class="widget-header-sub">Your banking accessibility assistant</div>
        </div>
      </div>

      <div class="quick-prompts" id="quick-prompts" aria-label="Quick questions">
        <button class="quick-prompt" data-q="How do I send money?">Send money</button>
        <button class="quick-prompt" data-q="What is my IBAN?">My IBAN</button>
        <button class="quick-prompt" data-q="How do I freeze my card?">Freeze card</button>
        <button class="quick-prompt" data-q="How do I add to my savings?">Add savings</button>
      </div>

      <!-- Hidden file input — accepts camera or file on mobile -->
      <input type="file" id="receipt-input" accept="image/*" capture="environment"
             style="display:none" aria-label="Upload receipt image">

      <div class="widget-messages" id="widget-messages" role="log" aria-live="polite" aria-label="Conversation">
        <div class="msg bot">
          Hi! I'm Guide — tap any button on screen, or ask me anything. I'll show you exactly where to go. 👋
        </div>
      </div>

      <div class="widget-input-area">
        <div class="voice-indicator" aria-live="polite">
          <div class="voice-dot"></div>
          Listening…
        </div>
        <div id="attachment-preview" class="attachment-preview" hidden>
          <img id="attachment-thumb" class="attachment-thumb-small" alt="Attachment preview">
          <span class="attachment-label">Receipt attached</span>
          <button id="attachment-remove" class="attachment-remove-btn" aria-label="Remove attachment">×</button>
        </div>
        <div class="widget-input-row">
          <button class="btn-icon mic" id="mic-btn" aria-label="Toggle voice input" title="Tap to start, tap again to stop">🎤</button>
          <button class="btn-icon attach" id="attach-btn" aria-label="Attach receipt image">📎</button>
          <input type="text" id="chat-input" placeholder="Ask me anything..." aria-label="Type your question" autocomplete="off">
          <button class="btn-icon send" id="send-btn" aria-label="Send message">→</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /.phone-frame -->

<script src="/static/app.js"></script>
</body>
</html>
