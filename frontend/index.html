<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq — Bunqy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic" />
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Lighthouse overlay -->
<div id="lh-overlay" aria-hidden="true"></div>

<!-- Animated guide mascot -->
<div id="mascot" aria-hidden="true">✦</div>

<!-- Narration toast -->
<div id="narration-toast" role="status" aria-live="polite"></div>

<div class="phone-frame">

  <!-- Push notification banner -->
  <div id="push-banner" class="push-banner" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="push-banner-icon" id="push-banner-icon"></div>
    <div class="push-banner-body">
      <div class="push-banner-title" id="push-banner-title"></div>
      <div class="push-banner-msg" id="push-banner-msg"></div>
    </div>
    <button class="push-banner-close" id="push-banner-close" aria-label="Dismiss notification">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Top Navigation — direct child of frame, no sticky needed -->
  <nav class="top-nav" role="navigation" aria-label="Main navigation">

    <!-- Profile avatar + dropdown -->
    <div class="nav-corner-wrap" id="profile-wrap">
      <button class="nav-avatar" id="nav-profile-btn" aria-label="Profile" aria-haspopup="true" aria-expanded="false">A</button>
      <div class="nav-dropdown" id="profile-dropdown" hidden>
        <button class="dropdown-item" disabled>Settings</button>
        <a class="dropdown-item dropdown-signout" href="/auth/logout">Sign out</a>
      </div>
    </div>

    <div class="nav-pills" role="tablist">
      <button class="nav-pill" data-page="pay" data-element-id="nav-pay" role="tab" aria-selected="false" aria-label="Pay" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </button>
      <button class="nav-pill" data-page="accounts" data-element-id="nav-accounts" role="tab" aria-selected="false" aria-label="Accounts" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </button>
      <button class="nav-pill active" data-page="home" data-element-id="nav-home" role="tab" aria-selected="true" aria-label="Home" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1z"/><polyline points="9,21 9,13 15,13 15,21"/></svg>
      </button>
      <button class="nav-pill" data-page="cards" data-element-id="nav-cards" role="tab" aria-selected="false" aria-label="Cards" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/><line x1="5" y1="15" x2="9" y2="15"/></svg>
      </button>
      <button class="nav-pill" data-page="savings" data-element-id="nav-savings" role="tab" aria-selected="false" aria-label="Savings" tabindex="0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23,6 13,16 8,11 1,18"/><polyline points="17,6 23,6 23,12"/></svg>
      </button>
    </div>

    <!-- Accessibility dropdown -->
    <div class="nav-corner-wrap" id="a11y-wrap">
      <button class="nav-a11y-btn" id="nav-a11y-btn" aria-label="Accessibility options" aria-haspopup="true" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
      <div class="nav-dropdown nav-dropdown-right" id="a11y-dropdown" hidden>
        <div class="dropdown-label">Display</div>
        <div class="dropdown-group" role="group" aria-label="Accessibility mode">
          <button class="mode-btn active" data-mode="default" aria-pressed="true">Aa</button>
          <button class="mode-btn" data-mode="blind" aria-pressed="false">👁</button>
          <button class="mode-btn" data-mode="low_vision" aria-pressed="false">🔍</button>
          <button class="mode-btn" data-mode="dyslexic" aria-pressed="false">Dy</button>
          <button class="mode-btn" data-mode="colorblind" aria-pressed="false" aria-label="Colorblind mode">CB</button>
        </div>
        <div class="dropdown-label" style="margin-top:10px">Speech</div>
        <div class="dropdown-group" role="group" aria-label="Speech output">
          <button class="speech-btn active" id="btn-speech-on" aria-pressed="true">On</button>
          <button class="speech-btn" id="btn-speech-off" aria-pressed="false">Off</button>
        </div>
        <div class="dropdown-label" style="margin-top:10px">Language</div>
        <div class="dropdown-group" role="group" aria-label="Language">
          <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
          <button class="lang-btn" data-lang="nl" aria-pressed="false">NL</button>
        </div>
      </div>
    </div>

  </nav>

  <div class="phone-screen">
    <!-- Page Content (rendered by JS) -->
    <main id="page-content" role="main" aria-live="polite"></main>
  </div><!-- /.phone-screen -->

  <!-- Bunqy Widget -->
  <div id="ai-widget" aria-label="Bunqy assistant">
    <div class="widget-mini-bar" id="widget-mini-bar" role="button" tabindex="0" aria-label="Expand Bunqy">
      <span class="widget-mini-icon">✦</span>
      <span class="widget-mini-text" id="widget-mini-text"></span>
      <span class="widget-mini-hint">Tap here for next step</span>
    </div>
    <div class="widget-fab" id="widget-toggle" role="button" aria-expanded="false" aria-label="Open Bunqy" tabindex="0">✦</div>
    <div class="widget-panel" id="widget-panel" role="dialog" aria-label="Bunqy chat">
      <div class="widget-header">
        <div class="widget-header-dot"></div>
        <div style="flex:1">
          <div class="widget-header-title">Bunqy</div>
          <div class="widget-header-sub">Your banking accessibility assistant</div>
        </div>
        <button class="widget-close-btn" id="widget-close-btn" aria-label="Close Bunqy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="quick-prompts" id="quick-prompts" aria-label="Example questions">
        <button class="quick-prompt qp-blue"  data-q="What is my IBAN?">What is my IBAN?</button>
        <button class="quick-prompt qp-orange" data-q="Send €10 to Sara">Send €10 to Sara</button>
        <button class="quick-prompt qp-purple" data-q="Split €60 with Tom and Mia">Split €60 with Tom and Mia</button>
        <button class="quick-prompt qp-green"  data-q="Create a payment link for €25">Payment link for €25</button>
        <button class="quick-prompt qp-gray"   data-q="What were my last transactions?">Last transactions</button>
      </div>

      <!-- Hidden file input — accepts camera or file on mobile -->
      <input type="file" id="receipt-input" accept="image/*" capture="environment"
             style="display:none" aria-label="Upload receipt image">

      <div class="widget-messages" id="widget-messages" role="log" aria-live="polite" aria-label="Conversation">
        <div class="msg bot">
          Hi! I'm Bunqy — tap any button on screen, or ask me anything. I'll show you exactly where to go. 👋
        </div>
      </div>

      <div class="widget-input-area">
        <div class="voice-indicator" aria-live="polite">
          <div class="voice-dot"></div>
          Listening…
        </div>
        <div id="attachment-preview" class="attachment-preview" hidden>
          <img id="attachment-thumb" class="attachment-thumb-small" alt="Attachment preview">
          <span class="attachment-label">Receipt attached</span>
          <button id="attachment-remove" class="attachment-remove-btn" aria-label="Remove attachment">×</button>
        </div>
        <div class="widget-input-row">
          <button class="btn-icon mic" id="mic-btn" aria-label="Toggle voice input" title="Tap to start, tap again to stop">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          </button>
          <button class="btn-icon attach" id="attach-btn" aria-label="Attach receipt image">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="text" id="chat-input" placeholder="Ask me anything…" aria-label="Type your question" autocomplete="off">
          <button class="btn-icon send" id="send-btn" aria-label="Send message">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction detail bottom sheet -->
  <div id="txn-sheet-backdrop" class="txn-sheet-backdrop" onclick="closeTxnDetail()" aria-hidden="true"></div>
  <div id="txn-sheet" class="txn-sheet" role="dialog" aria-label="Transaction details" aria-modal="true">
    <div class="txn-sheet-handle"></div>
    <div class="txn-sheet-content" id="txn-sheet-content"></div>
  </div>

</div><!-- /.phone-frame -->

<script src="/static/app.js"></script>
</body>
</html>
