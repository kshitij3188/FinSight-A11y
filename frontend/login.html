<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .login-card {
      background: #1C1C1E;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
      border: 1px solid #2C2C2E;
    }

    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: #E2E8F0;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .login-logo span {
      color: #0A84FF;
    }

    .login-tagline {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 32px;
    }

    .login-error {
      background: #2D1010;
      border: 1px solid #7F1D1D;
      color: #F87171;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94A3B8;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #2C2C2E;
      border-radius: 10px;
      font-size: 15px;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
      background: #000000;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #0A84FF;
      background: #000000;
    }

    input::placeholder { color: #64748B; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0A84FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-login:hover { background: #0060D0; }
    .btn-login:active { transform: scale(0.98); }

    .login-hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #2D3748;
      font-size: 12px;
      color: #64748B;
      line-height: 1.6;
    }

    .login-hint strong {
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">bun<span>q</span></div>
    <div class="login-tagline">Sign in to your account</div>

    <!--ERROR_PLACEHOLDER-->

    <form method="POST" action="/auth/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@bunq-demo.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign in</button>
    </form>

    <div class="login-hint">
      <strong>Demo accounts</strong> — password: <code>Demo1234</code><br>
      ayako.mercati@bunq-demo.com<br>
      corrin.hunt@bunq-demo.com<br>
      lydia.york@bunq-demo.com
    </div>
  </div>
</body>
</html>
