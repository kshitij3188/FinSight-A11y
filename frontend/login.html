<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .login-logo span {
      color: #00c29a;
    }

    .login-tagline {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .login-error {
      background: #fff1f0;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #00c29a;
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-login:hover { background: #2d2d4e; }
    .btn-login:active { transform: scale(0.98); }

    .login-hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .login-hint strong {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">bun<span>q</span></div>
    <div class="login-tagline">Sign in to your account</div>

    <!--ERROR_PLACEHOLDER-->

    <form method="POST" action="/auth/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@bunq-demo.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign in</button>
    </form>

    <div class="login-hint">
      <strong>Demo accounts:</strong><br>
      alex.johnson@bunq-demo.com / Alex123<br>
      sarah.chen@bunq-demo.com / Sarah123<br>
      marco.rossi@bunq-demo.com / Marco123
    </div>
  </div>
</body>
</html>
